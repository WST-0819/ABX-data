<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抗生素查詢系統</title>
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSdOy22a2Li6l51RSKeA29mpBcSqTuPlDUuePw2QLRmerWJL--xvYX1CL9V47r-csEFIqjWveW8N2AT/pub?gid=1596306221&single=true&output=csv"></script>
</head>
<body>
  <h2>抗生素劑量查詢表</h2>
  <button class="load-btn" onclick="loadData()">載入最新資料</button>
  
  <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="請輸入藥名學名或商品名搜尋...">

  <div class="tab-container" id="tabs" style="display:none;">
    <button class="tab-btn active" onclick="switchMode('renal', this)">腎功能模式</button>
    <button class="tab-btn" onclick="switchMode('dialysis', this)">透析模式</button>
    <button class="tab-btn" onclick="switchMode('hepatic', this)">肝功能模式</button>
    <button class="tab-btn" onclick="switchMode('pediatric', this)">小兒模式</button>
    <button class="tab-btn" onclick="switchMode('ecmo', this)">ECMO模式</button>
    <button class="tab-btn" onclick="switchMode('all', this)">顯示全部欄位</button>
  </div>

  <div id="table-container">
    <p style="color: gray;">請點擊上方按鈕載入資料...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
