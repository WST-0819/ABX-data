<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抗生素臨床劑量查詢系統</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>抗生素臨床劑量查詢系統</h1>
        </header>

        <div class="control-panel">
            <input type="text" id="searchInput" class="search-box" placeholder="輸入藥品名稱或成分進行快速查詢...">
            <div class="filter-buttons" id="viewToggles">
                <button class="btn active" data-target="adult">一般成人劑量</button>
                <button class="btn" data-target="dialysis">血液透析 (HD/CAPD/CVVH)</button>
                <button class="btn" data-target="ecmo">ECMO 調整</button>
                <button class="btn" data-target="pediatric">小兒劑量</button>
            </div>
        </div>

        <main id="drugsGrid" class="drugs-grid" data-view="adult">
            <div class="loading-text">資料載入中...</div>
        </main>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
