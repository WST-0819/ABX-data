<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 試算表查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .result-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .category { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>資料查詢系統</h2>
    <div class="search-box">
        <input type="text" id="keyword" placeholder="請輸入關鍵字（如品名、用途）...">
        <button onclick="searchData()">搜尋</button>
    </div>
    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
